<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <title>Review Logs | Achievement App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css?v=20260121-1">
  <link rel="stylesheet" href="nav.css">
  <meta name="theme-color" content="#0B4F8A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Achievement App" />

</head>
<body class="app-shell tall-background review-logs-page">
  <div class="app-main">
<div id="envBadge" class="env-badge" style="display:none;"></div>

  <main class="app">

    <header id="pageHeader" class="review-header">
      <h2 class="review-title">Review Points</h2>
      <img id="reviewRoleBadge" class="review-role-badge" src="" alt="Role badge">
    </header>

    <section id="categorySummary" class="summary-strip"></section>

    <div class="filter-toolbar">
      <div class="filter-left">
        <input id="searchInput" type="text" placeholder="Search notes...">
        <button id="filterLogsBtn" class="blue-button" type="button">Filter Logs</button>
      </div>
      <div class="filter-right">
        <div class="view-toggle">
          <button id="showLogsBtn" class="blue-button">Logs</button>
          <button id="showNotificationsBtn" class="blue-button">Notifications</button>
        </div>
        <button id="quickAddBtn" class="blue-button">Quick Add</button>
      </div>
    </div>
    <div id="activeFiltersSummary" class="active-filters-summary" style="display:none;"></div>

    <div id="notificationsSection" class="notifications-panel" style="display:none;"></div>

    <div id="bulkApprovePanel" class="bulk-approve-panel" style="display:none;">
      <label>Points to assign:
        <input type="number" id="bulkPoints">
      </label>
      <button id="confirmBulkApprove" class="blue-button">Confirm</button>
      <button id="cancelBulkApprove" class="blue-button" style="background:#999;">Cancel</button>
    </div>

    <div id="bulkActionBar" class="bulk-action-bar" style="display:none;">
      <button id="bulkApproveBtn" class="blue-button">Approve All</button>
      <button id="bulkRejectBtn" class="blue-button" style="background:#f0ad4e;">Reject All</button>
      <button id="deleteSelectedBtn" class="blue-button" style="background:#d9534f;">Delete Selected</button>
    </div>

    <div id="logsWrapper" class="logs-table-wrap">
      <div id="reviewLogsErrorPanel" class="review-logs-error" role="status" aria-live="polite" style="display:none;"></div>
      <div class="logs-scroll">
        <table id="logsTable">
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAll"></th>
              <th data-sort="fullName">Student</th>
              <th data-sort="category">Category</th>
              <th data-sort="date">Date</th>
              <th data-sort="points">Points</th>
              <th>Note</th>
              <th data-sort="status">Status</th>
            </tr>
          </thead>
          <tbody id="logsTableBody"></tbody>
        </table>
      </div>
    </div>

    <div id="paginationControls" class="pagination-row">
      <div class="pager-controls">
        <button id="prevPageBtn" class="blue-button">Prev</button>
        <span id="pageInfo"></span>
        <button id="nextPageBtn" class="blue-button">Next</button>
        <select id="logsPerPage" class="blue-button">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
        </select>
      </div>
    </div>

    <div id="quickAddModal" class="quickadd-modal-overlay" style="display:none;">
      <div class="quickadd-modal-shell">
        <form id="quickAddForm" class="staff-card quickadd-card">
          <div class="quicklog-header-row">
            <div class="quicklog-title">Quick Log</div>
          </div>

          <label for="quickAddStudentSearch">Students</label>
          <div class="staff-student-picker quickadd-student-picker">
            <input
              id="quickAddStudentSearch"
              type="text"
              placeholder="Type a student name..."
              autocomplete="off"
            />
            <div id="quickAddStudentsDropdown" class="staff-student-dropdown" hidden></div>
            <div id="quickAddStudentsSelected" class="staff-student-selected" aria-live="polite"></div>
            <select id="quickAddStudents" multiple hidden aria-hidden="true"></select>
          </div>

          <label>Quick prompts</label>
          <div id="quickAddPromptGrid" class="staff-prompt-grid"></div>

          <button id="quickAddMoreCategoriesToggle" class="staff-more-categories-toggle" type="button" aria-expanded="false">
            + More categories
          </button>
          <div id="quickAddMoreCategoriesPanel" class="ql-category-pop staff-more-categories-panel" hidden>
            <label for="quickAddCategory">Other category</label>
            <select id="quickAddCategory" class="white-input">
              <option value="">Select category</option>
            </select>
          </div>

          <label for="quickAddPoints">Points</label>
          <input type="number" id="quickAddPoints" class="white-input" placeholder="Enter points" />
          <p id="quickAddPracticePointsNote" class="staff-msg" style="display:none;">Practice category will automatically award 5 points per day.</p>

          <label>Dates</label>
          <button id="quickAddCalendarToggle" class="blue-button staff-calendar-toggle" type="button">
            Select dates
          </button>
          <div id="quickAddCalendarPanel" class="staff-calendar-panel" hidden>
            <div class="calendar">
              <div class="calendar-header">
                <button id="quickAddCalPrev" class="calendar-nav" type="button">&lt;</button>
                <div id="quickAddCalMonthLabel" class="calendar-title"></div>
                <button id="quickAddCalNext" class="calendar-nav" type="button">&gt;</button>
              </div>
              <div class="calendar-weekdays">
                <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
              </div>
              <div id="quickAddCalendar" class="calendar-grid"></div>
            </div>
          </div>

          <label for="quickAddNotes">Notes</label>
          <textarea id="quickAddNotes" class="white-input" placeholder="Optional note"></textarea>

          <div class="button-row quickadd-actions">
            <button id="quickAddSubmitAnother" class="blue-button quickadd-submit" type="button">Submit &amp; Add Another</button>
            <button id="quickAddSubmitClose" class="blue-button quickadd-submit" type="button">Submit &amp; Close</button>
            <button id="quickAddCancel" class="blue-button quickadd-cancel" type="button">Cancel</button>
          </div>
          <p id="quickAddStatusMsg" class="staff-msg" style="display:none;" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <div id="filterLogsModal" class="filter-logs-modal-overlay" style="display:none;">
      <div class="filter-logs-modal-shell" role="dialog" aria-modal="true" aria-labelledby="filterLogsTitle">
        <div class="filter-logs-modal-header">
          <h3 id="filterLogsTitle">Filter Logs</h3>
          <button id="filterLogsClose" class="modal-close" type="button" aria-label="Close filter logs modal">&times;</button>
        </div>
        <div class="filter-logs-modal-body">
          <label for="filterStudentSearch">Students</label>
          <div class="staff-student-picker review-filter-student-picker">
            <input
              id="filterStudentSearch"
              class="white-input"
              type="text"
              placeholder="Type a student name..."
              autocomplete="off"
            />
            <div id="filterStudentsDropdown" class="staff-student-dropdown" hidden></div>
            <div id="filterStudentsSelected" class="staff-student-selected" aria-live="polite"></div>
          </div>

          <div class="filter-logs-date-grid">
            <label for="filterDateFrom">
              From
              <input id="filterDateFrom" class="white-input" type="date">
            </label>
            <label for="filterDateTo">
              To
              <input id="filterDateTo" class="white-input" type="date">
            </label>
          </div>

          <label for="filterKeyword">Keyword</label>
          <input id="filterKeyword" class="white-input" type="text" placeholder="Search notes...">

          <label for="filterCategory">Category</label>
          <select id="filterCategory" class="white-input">
            <option value="">Any category</option>
            <option value="practice">Practice</option>
            <option value="participation">Participation</option>
            <option value="performance">Performance</option>
            <option value="personal">Personal</option>
            <option value="proficiency">Proficiency</option>
          </select>

          <label for="filterStatus">Status</label>
          <select id="filterStatus" class="white-input">
            <option value="">Any status</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="needs info">Needs Info</option>
          </select>
        </div>
        <div class="filter-logs-modal-actions">
          <button id="applyLogFiltersBtn" class="blue-button" type="button">Apply Filters</button>
          <button id="resetLogFiltersBtn" class="blue-button" type="button">Reset Filters</button>
        </div>
      </div>
    </div>

    <div id="filterNotificationsModal" class="filter-logs-modal-overlay" style="display:none;">
      <div class="filter-logs-modal-shell" role="dialog" aria-modal="true" aria-labelledby="filterNotificationsTitle">
        <div class="filter-logs-modal-header">
          <h3 id="filterNotificationsTitle">Filter Notifications</h3>
          <button id="filterNotificationsClose" class="modal-close" type="button" aria-label="Close filter notifications modal">&times;</button>
        </div>
        <div class="filter-logs-modal-body">
          <label for="notificationFilterStudentSearch">Students</label>
          <div class="staff-student-picker notification-filter-student-picker">
            <input id="notificationFilterStudentSearch" class="white-input" type="text" placeholder="Type a student name..." autocomplete="off" />
            <div id="notificationFilterStudentsDropdown" class="staff-student-dropdown" hidden></div>
            <div id="notificationFilterStudentsSelected" class="staff-student-selected" aria-live="polite"></div>
          </div>

          <div class="filter-logs-date-grid">
            <label for="notificationFilterDateFrom">
              From
              <input id="notificationFilterDateFrom" class="white-input" type="date">
            </label>
            <label for="notificationFilterDateTo">
              To
              <input id="notificationFilterDateTo" class="white-input" type="date">
            </label>
          </div>

          <label for="notificationFilterKeyword">Keyword</label>
          <input id="notificationFilterKeyword" class="white-input" type="text" placeholder="Search notifications...">

          <label for="notificationFilterType">Notification type</label>
          <select id="notificationFilterType" class="white-input">
            <option value="">Any type</option>
            <option value="level_completed">Completed level</option>
            <option value="needs_info">Needs Info</option>
          </select>

          <label for="notificationFilterRecognition">Recognition given</label>
          <select id="notificationFilterRecognition" class="white-input">
            <option value="all">All</option>
            <option value="given">Given</option>
            <option value="not_given">Not given</option>
          </select>

          <label for="notificationSort">Sort</label>
          <select id="notificationSort" class="white-input">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="student_az">Student A-Z</option>
            <option value="level_low_high">Completed level low to high</option>
            <option value="level_high_low">Completed level high to low</option>
            <option value="recognition_not_given">Recognition not given first</option>
          </select>
        </div>
        <div class="filter-logs-modal-actions">
          <button id="applyNotificationFiltersBtn" class="blue-button" type="button">Apply Filters</button>
          <button id="resetNotificationFiltersBtn" class="blue-button" type="button">Reset Filters</button>
        </div>
      </div>
    </div>

    <div id="recognitionExportModal" class="filter-logs-modal-overlay" style="display:none;">
      <div class="filter-logs-modal-shell" role="dialog" aria-modal="true" aria-labelledby="recognitionExportTitle">
        <div class="filter-logs-modal-header">
          <h3 id="recognitionExportTitle">Export / Print</h3>
          <button id="recognitionExportClose" class="modal-close" type="button" aria-label="Close export and print modal">&times;</button>
        </div>
        <div class="filter-logs-modal-body">
          <label for="recognitionExportFormat">Output Format</label>
          <select id="recognitionExportFormat" class="white-input">
            <option value="print">Print / Save PDF</option>
            <option value="csv">Download CSV</option>
          </select>

          <label for="recognitionExportScope">Data Scope</label>
          <select id="recognitionExportScope" class="white-input">
            <option value="highest">Highest Completed Level Per Student</option>
            <option value="recent">Most Recent Level Notifications</option>
            <option value="history">Entire Level Notification History</option>
            <option value="custom">Custom Date Range</option>
          </select>

          <div id="recognitionExportDateRange" class="filter-logs-date-grid" style="display:none;">
            <label for="recognitionExportDateFrom">
              From date
              <input id="recognitionExportDateFrom" class="white-input" type="date">
            </label>
            <label for="recognitionExportDateTo">
              To date
              <input id="recognitionExportDateTo" class="white-input" type="date">
            </label>
          </div>

          <label for="recognitionExportSort">Sorting</label>
          <select id="recognitionExportSort" class="white-input">
            <option value="level_desc">Highest Level</option>
            <option value="student_az">Student A-Z</option>
            <option value="date_desc">Completion Date Newest First</option>
            <option value="date_asc">Completion Date Oldest First</option>
          </select>

          <div class="recognition-export-checks" aria-label="Export filters">
            <label><input id="recognitionExportIncludeDates" type="checkbox" autocomplete="off" checked> Include completion dates</label>
            <label><input id="recognitionExportIncludeTeacher" type="checkbox" autocomplete="off"> Include teacher, if available</label>
            <label><input id="recognitionExportIncludeInstrument" type="checkbox" autocomplete="off"> Include instrument, if available</label>
            <label><input id="recognitionExportIncludePoints" type="checkbox" autocomplete="off"> Include total points, if available</label>
            <label><input id="recognitionExportOnlyUnrecognized" type="checkbox" autocomplete="off"> Show only unrecognized students</label>
            <label><input id="recognitionExportIncludeInactive" type="checkbox" autocomplete="off"> Include inactive students</label>
          </div>
        </div>
        <div class="filter-logs-modal-actions">
          <button id="runRecognitionExportBtn" class="blue-button" type="button">Continue</button>
          <button id="cancelRecognitionExportBtn" class="blue-button" type="button">Cancel</button>
        </div>
      </div>
    </div>

  </main>
  </div>

  <div id="app-bottom-nav"></div>
  <script src="config.js"></script>
  <script src="supabase-config.js"></script>
  <script type="module" src="supabaseClient.js"></script>
  <script type="module" src="utils.js"></script>
  <script type="module" src="studio-routing.js"></script>
  <script type="module" src="nav.js?v=20260506-2"></script>

  <script type="module" src="review-logs.js?v=20260506-8"></script>
  <script type="module" src="pwa-install.js"></script>
</body>
</html>
